# Dependabot: wöchentliche, gruppierte Dependency-Updates für npm und
# GitHub Actions. Gruppierung reduziert PR-Lärm für die Ehrenamtlichen,
# die das Projekt warten.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch']
    open-pull-requests-limit: 5
    # Majors, die eine geplante Migration brauchen – nicht per Bump lösbar:
    # - Prisma 7: neues prisma.config.ts, geänderte Client-Generierung
    # - @vitejs/plugin-react 6 + Vite 8: Rolldown-Umstieg, Tailwind-Plugin prüfen
    # - otplib 13: komplette API-Neuschreibung mit ESM-only-Dependencies
    #   (@scure/@noble v2) – Jest im CJS-Modus kann sie nicht laden;
    #   erst mit Umstieg auf ESM/Vitest machbar
    ignore:
      - dependency-name: prisma
        update-types: ['version-update:semver-major']
      - dependency-name: '@prisma/client'
        update-types: ['version-update:semver-major']
      - dependency-name: '@vitejs/plugin-react'
        update-types: ['version-update:semver-major']
      - dependency-name: vite
        update-types: ['version-update:semver-major']
      - dependency-name: otplib
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ['*']
