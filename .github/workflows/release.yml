# Release-Pipeline (Single-Run, release-please-getrieben):
#
# 1. release-please (bei jedem Push auf main): pflegt einen Release-PR
#    mit Changelog aus Conventional Commits. Wird der PR gemergt, entsteht
#    Tag (v*) + GitHub Release, und der Image-Build laeuft im SELBEN Lauf.
#    Warum release-please statt semantic-release: PR-basiert und damit
#    kompatibel mit Branch Protection – es pusht nie direkt auf main.
#
# 2. Image-Build (nur wenn release-please ein Release erzeugt hat, Output
#    release_created == 'true'): Multi-Arch-Images (amd64 + arm64) nach GHCR,
#    signiert mit cosign (keyless/OIDC), SBOM als Release-Artefakt.
#
#    Jede Architektur baut NATIV auf einem passenden Runner (amd64 auf
#    ubuntu-latest, arm64 auf ubuntu-24.04-arm – fuer oeffentliche Repos
#    kostenlos). Frueher lief arm64 per QEMU-Emulation im selben Job; das
#    ist nicht nur langsam, sondern crasht bei kaltem Cache reproduzierbar
#    (qemu: uncaught target signal 4 waehrend pnpm install) und haengt dann
#    bis zum Job-Timeout. Der merge-Job fuegt die per-Arch-Images zu einem
#    Multi-Arch-Manifest zusammen, signiert es und haengt die SBOM ans
#    Release.
#
#    WICHTIG: Der Build haengt bewusst am Output des release-please-Jobs im
#    selben Push-Lauf und NICHT an einem separaten `release: published`-Event.
#    Grund: Ein Release, das release-please mit dem GITHUB_TOKEN anlegt,
#    triggert KEINE Folge-Workflows (GitHub unterbindet Rekursion) – mit dem
#    alten `on: release`-Trigger lief der Build daher nie an.
#
# Deployment-Philosophie: Diese Pipeline deployt NICHT auf fremde Server.
# Betreiber aktualisieren selbst per `docker compose pull && up -d`
# (siehe README); eine SSH-Deploy-Vorlage liegt als
# deploy-example.yml.disabled bei.
name: Release

on:
  push:
    branches: [main]
  # Manueller Nachbau der Images für ein bestehendes Release – nötig, wenn
  # der Build-Teil eines Release-Laufs fehlgeschlagen ist und die Images
  # für den Tag fehlen.
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release-Tag, dessen Images gebaut werden sollen (z. B. v0.5.0)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # Releases nie mittendrin abbrechen

jobs:
  release-please:
    # Nur bei Pushes auf main – ein manueller Dispatch baut nur Images nach
    # und darf keinen neuen Release-PR anfassen.
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # Release + Tag anlegen
      pull-requests: write # Release-PR pflegen
    # Outputs an den Build-Job durchreichen: ob ein Release entstand (damit
    # der Build im selben Lauf startet) und welchen Tag es traegt (fuer die
    # Image-Version + den SBOM-Upload).
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Third-Party-Action → SHA-gepinnt (Supply Chain), Tag als Kommentar
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Phase 1: pro Komponente und Architektur nativ bauen. Jedes per-Arch-Image
  # wird unter einem temporaeren Arch-Tag (<version>-amd64 / <version>-arm64)
  # gepusht; der merge-Job unten fuegt daraus das Multi-Arch-Manifest
  # zusammen.
  build:
    # Laeuft im selben Push-Lauf, sobald release-please ein Release erzeugt
    # hat – oder manuell per Dispatch für einen bestehenden Tag (dann ist
    # release-please geskippt, daher always()).
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      packages: write # GHCR-Push
    strategy:
      matrix:
        name: [api, web]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      # Beim Dispatch den Stand des Release-Tags bauen, nicht den aktuellen
      # main-HEAD (leerer ref = Default-Verhalten beim Push-Lauf).
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag_name || '' }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Version ohne fuehrendes "v" (Tag v1.2.3 → Image-Tag 1.2.3)
      - name: Resolve version
        id: version
        env:
          TAG_NAME: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/${{ matrix.name }}/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/serveflow-${{ matrix.name }}:${{ steps.version.outputs.version }}-${{ matrix.arch }}
          # SBOM + Provenance als Attestations direkt im Image
          sbom: true
          provenance: mode=max
          # GitHub-Actions-Cache beschleunigt Folgebuilds erheblich
          cache-from: type=gha,scope=${{ matrix.name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.arch }}

  # Phase 2: per-Arch-Images zu einem Multi-Arch-Manifest zusammenfuehren,
  # unter den endgueltigen Tags veroeffentlichen, signieren, SBOM anhaengen.
  merge-and-sign:
    needs: [release-please, build]
    if: ${{ always() && needs.build.result == 'success' && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # SBOM ans Release anhängen
      packages: write # GHCR-Push (Manifest)
      id-token: write # cosign keyless (OIDC)
    strategy:
      matrix:
        name: [api, web]
    steps:
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: exakte Version (1.2.3), latest und Git-SHA
      - name: Create multi-arch manifest
        id: manifest
        env:
          TAG_NAME: ${{ inputs.tag_name || needs.release-please.outputs.tag_name }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/serveflow-${{ matrix.name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          VERSION="${TAG_NAME#v}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:sha-${GIT_SHA}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
          DIGEST="$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{ .Manifest.Digest }}')"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # Keyless-Signierung: kein Schlüssel im Repo, Identität kommt aus
      # dem OIDC-Token des Workflows – verifizierbar mit
      # `cosign verify ghcr.io/<owner>/serveflow-api:<tag>`
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image (cosign keyless)
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/serveflow-${{ matrix.name }}@${DIGEST}"

      # Zusätzlich menschenlesbare SBOM (SPDX) als Release-Artefakt
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/serveflow-${{ matrix.name }}@${{ steps.manifest.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json
      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ inputs.tag_name || needs.release-please.outputs.tag_name }}" "sbom-${{ matrix.name }}.spdx.json" --clobber
