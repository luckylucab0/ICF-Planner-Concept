# Release-Pipeline (Single-Run, release-please-getrieben):
#
# 1. release-please (bei jedem Push auf main): pflegt einen Release-PR
#    mit Changelog aus Conventional Commits. Wird der PR gemergt, entsteht
#    Tag (v*) + GitHub Release, und der Image-Build laeuft im SELBEN Lauf.
#    Warum release-please statt semantic-release: PR-basiert und damit
#    kompatibel mit Branch Protection – es pusht nie direkt auf main.
#
# 2. Image-Build (nur wenn release-please ein Release erzeugt hat, Output
#    release_created == 'true'): Multi-Arch-Images (amd64 + arm64) nach GHCR,
#    signiert mit cosign (keyless/OIDC), SBOM als Release-Artefakt.
#
#    WICHTIG: Der Build haengt bewusst am Output des release-please-Jobs im
#    selben Push-Lauf und NICHT an einem separaten `release: published`-Event.
#    Grund: Ein Release, das release-please mit dem GITHUB_TOKEN anlegt,
#    triggert KEINE Folge-Workflows (GitHub unterbindet Rekursion) – mit dem
#    alten `on: release`-Trigger lief der Build daher nie an.
#
# Deployment-Philosophie: Diese Pipeline deployt NICHT auf fremde Server.
# Betreiber aktualisieren selbst per `docker compose pull && up -d`
# (siehe README); eine SSH-Deploy-Vorlage liegt als
# deploy-example.yml.disabled bei.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # Releases nie mittendrin abbrechen

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # Release + Tag anlegen
      pull-requests: write # Release-PR pflegen
    # Outputs an den Build-Job durchreichen: ob ein Release entstand (damit
    # der Build im selben Lauf startet) und welchen Tag es traegt (fuer die
    # Image-Version + den SBOM-Upload).
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Third-Party-Action → SHA-gepinnt (Supply Chain), Tag als Kommentar
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-push:
    # Laeuft im selben Push-Lauf, sobald release-please ein Release erzeugt hat.
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write # SBOM ans Release anhängen
      packages: write # GHCR-Push
      id-token: write # cosign keyless (OIDC)
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v7

      # QEMU + Buildx für Multi-Arch (amd64 für x86-Server, arm64 für
      # z. B. Hetzner-ARM oder Raspberry Pi)
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: exakte Version (1.2.3), latest und Git-SHA
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/serveflow-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest
            type=sha,format=long

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # SBOM + Provenance als Attestations direkt im Image
          sbom: true
          provenance: mode=max
          # GitHub-Actions-Cache beschleunigt Folgebuilds erheblich
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # Keyless-Signierung: kein Schlüssel im Repo, Identität kommt aus
      # dem OIDC-Token des Workflows – verifizierbar mit
      # `cosign verify ghcr.io/<owner>/serveflow-api:<tag>`
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image (cosign keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/serveflow-${{ matrix.name }}@${DIGEST}"

      # Zusätzlich menschenlesbare SBOM (SPDX) als Release-Artefakt
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/serveflow-${{ matrix.name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json
      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" "sbom-${{ matrix.name }}.spdx.json" --clobber
